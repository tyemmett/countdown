<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hours Until April 25, 5 PM CST/CDT</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      text-align: center;
      width: min(90vw, 420px);
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 12px;
    }

    .target {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 24px;
    }

    .hours {
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .label {
      font-size: 1rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Time Until April 25 at 5:00 PM Central</h1>
    <div class="target">Target: April 25, 2026 at 5:00 PM America/Chicago</div>
    <div id="hours" class="hours">--</div>
    <div class="label">hours remaining</div>
  </div>

  <script>
    const hoursEl = document.getElementById('hours');

    function getChicagoOffset(date) {
      const formatter = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/Chicago',
        timeZoneName: 'shortOffset'
      });

      const parts = formatter.formatToParts(date);
      const offsetPart = parts.find(part => part.type === 'timeZoneName');
      return offsetPart ? offsetPart.value.replace('GMT', '') : '-05:00';
    }

    function getTargetDate() {
      const probeDate = new Date('2026-04-25T12:00:00Z');
      const offset = getChicagoOffset(probeDate);
      return new Date(`2026-04-25T17:00:00${offset}`);
    }

    function updateCountdown() {
      const now = new Date();
      const target = getTargetDate();
      const diffMs = target - now;
      const diffHours = diffMs / (1000 * 60 * 60);

      if (diffMs <= 0) {
        hoursEl.textContent = '0.00';
        return;
      }

      hoursEl.textContent = diffHours.toFixed(2);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>

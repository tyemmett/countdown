<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hours Until April 25</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    .hours {
      font-size: 4rem;
      font-weight: bold;
    }

    .label {
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="hours" class="hours">--</div>
    <div class="label">hours until April 25, 5:00 PM (Central)</div>
  </div>

  <script>
    const hoursEl = document.getElementById("hours");

    // April 25, 2026 at 5:00 PM in America/Chicago
    // On this date Chicago is on CDT, which is UTC-5
    const target = new Date("2026-04-25T22:00:00Z");

    function update() {
      const now = new Date();
      const diff = (target - now) / (1000 * 60 * 60);

      hoursEl.textContent = diff <= 0 ? "0.00" : diff.toFixed(2);
    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>

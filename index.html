<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hours Until April 25</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    .hours {
      font-size: 4rem;
      font-weight: bold;
    }

    .label {
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="hours" class="hours">--</div>
    <div class="label">hours until April 25, 5:00 PM (Central)</div>
  </div>

  <script>
    const hoursEl = document.getElementById("hours");

    function getChicagoTimeOffset(date) {
      const formatter = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/Chicago",
        timeZoneName: "shortOffset"
      });

      const parts = formatter.formatToParts(date);
      const offset = parts.find(p => p.type === "timeZoneName").value;
      return offset.replace("GMT", "");
    }

    function getTargetDate() {
      const probe = new Date("2026-04-25T12:00:00Z");
      const offset = getChicagoTimeOffset(probe);
      return new Date(`2026-04-25T17:00:00${offset}`);
    }

    function update() {
      const now = new Date();
      const target = getTargetDate();
      const diff = (target - now) / (1000 * 60 * 60);

      if (diff <= 0) {
        hoursEl.textContent = "0.00";
      } else {
        hoursEl.textContent = diff.toFixed(2);
      }
    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
